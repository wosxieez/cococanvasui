<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CocoUI - Canvas UI Framework</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: #1a1a1a;
      overflow: hidden;
    }
    #info {
      position: fixed;
      top: 10px;
      right: 10px;
      color: #fff;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
      padding: 10px;
      border-radius: 4px;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="info">
    <strong>CocoUI</strong><br>
    Canvas UI Framework<br>
    <small>基于 HTML5 Canvas</small>
  </div>
</body>
</html>
